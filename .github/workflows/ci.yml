name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Web
            command: pnpm --filter @musictron/web run build
          - name: Desktop (Vite only)
            command: pnpm --filter @musictron/desktop run build:vite
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: ${{ matrix.command }}

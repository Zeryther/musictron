name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-latest
            command: build:mac
            artifact-name: release-macos
            artifact-path: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
          - platform: Windows
            runner: windows-latest
            command: build:win
            artifact-name: release-windows
            artifact-path: apps/desktop/release/*setup*.exe
          - platform: Linux
            runner: ubuntu-latest
            command: build:linux
            artifact-name: release-linux
            artifact-path: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build desktop for ${{ matrix.platform }}
        run: pnpm --filter @musictron/desktop run ${{ matrix.command }}
        env:
          # App config
          VITE_MUSICTRON_SERVER_URL: ${{ vars.MUSICTRON_SERVER_URL }}
          # macOS code signing (optional — set these secrets in repo settings)
          CSC_LINK: ${{ matrix.platform == 'macOS' && secrets.MAC_CERTIFICATE_P12_BASE64 || matrix.platform == 'Windows' && secrets.WIN_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'macOS' && secrets.MAC_CERTIFICATE_PASSWORD || matrix.platform == 'Windows' && secrets.WIN_CERTIFICATE_PASSWORD || '' }}
          # macOS notarization (optional)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Skip signing if no certificate is set
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'macOS' && (secrets.MAC_CERTIFICATE_P12_BASE64 != '') || false }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release, build-desktop]
    if: needs.release.outputs.published == 'true'
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Get desktop version
        id: version
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@musictron/desktop@${{ steps.version.outputs.version }}"
          name: "Musictron v${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

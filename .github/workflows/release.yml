name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-latest
            command: build:mac
            artifact-name: release-macos
            artifact-path: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
          - platform: Windows
            runner: windows-latest
            command: build:win
            artifact-name: release-windows
            artifact-path: apps/desktop/release/*setup*.exe
          - platform: Linux
            runner: ubuntu-latest
            command: build:linux
            artifact-name: release-linux
            artifact-path: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build desktop for ${{ matrix.platform }}
        run: pnpm --filter @musictron/desktop run ${{ matrix.command }}
        env:
          # macOS code signing (optional — set these secrets in repo settings)
          CSC_LINK: ${{ matrix.platform == 'macOS' && secrets.MAC_CERTIFICATE_P12_BASE64 || matrix.platform == 'Windows' && secrets.WIN_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'macOS' && secrets.MAC_CERTIFICATE_PASSWORD || matrix.platform == 'Windows' && secrets.WIN_CERTIFICATE_PASSWORD || '' }}
          # macOS notarization (optional)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Skip signing if no certificate is set
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'macOS' && (secrets.MAC_CERTIFICATE_P12_BASE64 != '') || false }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
